<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>統計検定2級 AI共闘学習アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        #ai-chat-history::-webkit-scrollbar { width: 4px; }
        #ai-chat-history::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl shadow-slate-200 overflow-hidden border border-slate-100">
        
        <div class="bg-blue-600 p-6">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-white text-xl font-bold flex items-center gap-2">
                    <span id="questionId" class="bg-blue-400 p-1 rounded text-sm">--</span>
                    <span id="categoryName">読み込み中...</span>
                </h1>
                <div id="priorityContainer" class="flex gap-1 text-amber-300"></div>
            </div>
            <div class="w-full bg-blue-800 rounded-full h-2">
                <div id="progressBar" class="bg-emerald-400 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="p-8">
            <div id="difficultyContainer" class="flex items-center gap-2 mb-4"></div>
    
            <div id="questionText" class="text-slate-700 text-lg leading-relaxed mb-6"></div>
            
            <div id="answerArea" class="grid grid-cols-1 gap-3 mb-6"></div>
              
            <div class="mt-8 border-t border-slate-100 pt-6">
                <div class="bg-blue-50 rounded-2xl p-4 border border-blue-100">
                    <h3 class="text-blue-800 font-bold text-sm mb-3 flex items-center gap-2">お助けAIパートナー</h3>
                    <div id="ai-chat-history" class="max-h-48 overflow-y-auto mb-4 space-y-3 p-2 bg-white/50 rounded-lg text-sm text-slate-600">
                        <div class="italic text-slate-500">「ヒントが必要な時は何でも聞いてくださいね！」</div>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="userQuestion" class="flex-grow p-3 border border-blue-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" placeholder="例：この記号の意味は？">
                        <button onclick="askAI()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-bold transition-all">質問</button>
                    </div>
                    <div id="loading" class="hidden text-xs text-blue-500 mt-2 ml-1 animate-pulse">AI思考中...</div>
                </div>
            </div>

            <div id="explanationContainer" class="hidden mt-6 p-6 bg-amber-50 border-l-4 border-amber-400 rounded-r-xl">
                <h2 class="font-bold text-amber-800 mb-2">💡 正解の解説</h2>
                <div id="explanation" class="text-slate-700 text-sm leading-relaxed"></div>
            </div>

            <button onclick="nextQuestion()" id="nextBtn" class="hidden mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                次の問題へ進む
            </button>
        </div> 
    </div>

    <script id="dataScript"></script>

    <script>
        let currentIndex = 0;
        let currentQuestion = null;

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const genre = params.get('genre');

            if (!genre) {
                alert("ジャンルが選択されていません。TOPに戻ります。");
                window.location.href = 'index.html';
                return;
            }

            // 動的にスクリプトタグを作成して読み込む
            const script = document.getElementById('dataScript');
            script.src = `questions/${genre}.js`;
            
            script.onload = () => {
                // genre.jsが読み込まれると、グローバル変数 allQuestions が使えるようになる
                if (typeof allQuestions !== 'undefined' && allQuestions.length > 0) {
                    renderQuestion(allQuestions[currentIndex]);
                } else {
                    console.error("データが見つかりません");
                    alert(`「${genre}」のデータが見つかりません。`);
                    window.location.href = 'index.html';
                }
            };

            script.onerror = () => {
                console.error(`questions/${genre}.js の読み込みに失敗しました`);
                alert(`「${genre}」のデータ読み込みに失敗しました。TOPに戻ります。`);
                window.location.href = 'index.html';
            };
        };

        function renderQuestion(q) {
            currentQuestion = q;
            
            const progress = ((currentIndex + 1) / allQuestions.length) * 100;
            document.getElementById("progressBar").style.width = `${progress}%`;
            document.getElementById("priorityContainer").innerHTML = '重要度:' + '★'.repeat(q.priority || 0);

            const difficultyContainer = document.getElementById("difficultyContainer");
            const diffs = { 1: ["基礎", "bg-emerald-100 text-emerald-700"], 2: ["標準", "bg-blue-100 text-blue-700"], 3: ["応用", "bg-rose-100 text-rose-700"] };
            const [label, color] = diffs[q.difficulty] || diffs[2];
            difficultyContainer.innerHTML = `<span class="text-xs font-bold text-slate-400 uppercase tracking-widest">難易度</span><span class="${color} px-2 py-0.5 rounded text-xs font-bold">${label}</span>`;

            document.getElementById("questionId").innerText = `Q${q.id}`;
            document.getElementById("categoryName").innerText = q.category;
            
            // Markdown画像置換
            const replaceImage = (text) => text.replace(/!\[.*?\]\((.*?)\)/g, '<img src="$1" class="w-full h-auto rounded-xl my-4 shadow-sm border border-slate-200">');
            
            document.getElementById("questionText").innerHTML = replaceImage(q.question);
            document.getElementById("explanationContainer").classList.add("hidden");
            document.getElementById("nextBtn").classList.add("hidden");

            const container = document.getElementById("answerArea");
            container.innerHTML = ""; 

            if (q.type === "選択式") {
                q.choices.forEach(choice => {
                    const btn = document.createElement("button");
                    btn.className = "w-full p-4 text-left border-2 border-slate-200 rounded-xl hover:bg-blue-50 hover:border-blue-500 transition-all duration-200";
                    btn.innerHTML = choice; 
                    btn.onclick = () => checkAnswer(choice, btn);
                    container.appendChild(btn);
                });
            } else if (q.type === "回答式") {
                const wrapper = document.createElement("div");
                wrapper.className = "flex flex-col gap-3";
                wrapper.innerHTML = `
                    <input type="text" id="answerInput" placeholder="回答を入力..." class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none">
                    <button onclick="checkAnswer(document.getElementById('answerInput').value.trim(), document.getElementById('answerInput'))" class="w-full p-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">解答を確定</button>
                `;
                container.appendChild(wrapper);
            }

            if (window.MathJax) MathJax.typesetPromise();
        }

        function checkAnswer(submittedValue, element) {
            if (!document.getElementById("nextBtn").classList.contains("hidden")) return;

            const isCorrect = (submittedValue === currentQuestion.answer);
            const container = document.getElementById("answerArea");
            
            // 選択式ボタンの全無効化
            const buttons = container.querySelectorAll("button");
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                element.classList.add("border-emerald-500", "bg-emerald-50");
            } else {
                element.classList.add("border-rose-500", "bg-rose-50");
                if (currentQuestion.type === "回答式") element.value = `正解: ${currentQuestion.answer}`;
            }

            // 解説表示
            const replaceImage = (text) => text.replace(/!\[.*?\]\((.*?)\)/g, '<img src="$1" class="w-full h-auto rounded-xl my-4 shadow-sm border border-slate-200">');
            document.getElementById("explanation").innerHTML = replaceImage(currentQuestion.explanation || "解説なし");
            document.getElementById("explanationContainer").classList.remove("hidden"); 
            document.getElementById("nextBtn").classList.remove("hidden");

            if (window.MathJax) MathJax.typesetPromise();
        }

        async function askAI() {
            // ... (AIチャットロジックは以前のまま、APIキー等を設定してください)
        }

        function nextQuestion() {
    currentIndex++;
    
    if (currentIndex < allQuestions.length) {
        // まだ問題がある場合は次の問題を表示
        renderQuestion(allQuestions[currentIndex]);
    } else {
        
        // 現在のURLからジャンル名を取得
        const params = new URLSearchParams(window.location.search);
        const genre = params.get('genre');

        // ジャンルを引き継いで解説ページへ遷移
        if (genre) {
            window.location.href = `Explanation.html?genre=${genre}`;
        } else {
            window.location.href = 'index.html';
        }
    }
}
    </script>
</body>
</html>

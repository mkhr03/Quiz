<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>統計検定2級 AI共闘学習アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        #ai-chat-history::-webkit-scrollbar { width: 4px; }
        #ai-chat-history::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl shadow-slate-200 overflow-hidden border border-slate-100">
        
        <div class="bg-blue-600 p-6">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-white text-xl font-bold flex items-center gap-2">
                    <span id="questionId" class="bg-blue-400 p-1 rounded text-sm">--</span>
                    <span id="categoryName">読み込み中...</span>
                </h1>
                <div id="priorityContainer" class="flex gap-1 text-amber-300"></div>
            </div>
            <div class="w-full bg-blue-800 rounded-full h-2">
                <div id="progressBar" class="bg-emerald-400 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="p-8">
            <div id="difficultyContainer" class="flex items-center gap-2 mb-4"></div>
    
            <p id="questionText" class="text-slate-700 text-lg leading-relaxed mb-6"></p>
            
            <div id="AnsweArea" class="grid grid-cols-1 gap-3 mb-6"></div>
              
            <div class="mt-8 border-t border-slate-100 pt-6">
                <div class="bg-blue-50 rounded-2xl p-4 border border-blue-100">
                    <h3 class="text-blue-800 font-bold text-sm mb-3 flex items-center gap-2">
                        お助けAIパートナー
                    </h3>
                    
                    <div id="ai-chat-history" class="max-h-48 overflow-y-auto mb-4 space-y-3 p-2 bg-white/50 rounded-lg text-sm">
                        <div class="text-slate-500 italic">「この問題のヒントが必要ですか？公式の意味や計算のコツなど、何でも聞いてください！」</div>
                    </div>

                    <div class="flex gap-2">
                        <input type="text" id="userQuestion" 
                               class="flex-grow p-3 border border-blue-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
                               placeholder="例：この式は何を表していますか？">
                        <button onclick="askAI()" 
                                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl text-sm font-bold transition-all shrink-0">
                            質問
                        </button>
                    </div>
                    <div id="loading" class="hidden text-xs text-blue-500 mt-2 ml-1 animate-pulse">AIが思考中...</div>
                </div>
            </div>

            <div id="explanationContainer" class="hidden mt-6 p-6 bg-amber-50 border-l-4 border-amber-400 rounded-r-xl">
                <h2 class="font-bold text-amber-800 mb-2">💡 正解の解説</h2>
                <p id="explanation" class="text-slate-700 text-sm leading-relaxed"></p>
            </div>

            <button onclick="nextQuestion()" id="nextBtn"
                class="hidden mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                次の問題へ進む
            </button>
        </div> 
    </div>

    <div id="choicesContainer" class="grid grid-cols-1 gap-3 mb-6"></div>

    <script>
        let allQuestions = [];
        let currentIndex = 0;
        let currentQuestion = null;

        window.onload = async () => {
            // 1. URLからパラメータ(?genre=xxx)を取得
            const params = new URLSearchParams(window.location.search);
            const genre = params.get('genre'); // "descriptive" や "inferential" が入る

            // 2. パラメータがない場合の安全策（直接 quiz.html を開いた時など）
            if (!genre) {
                alert("ジャンルが選択されていません。TOPに戻ります。");
                window.location.href = 'index.html';
                return;
            }

            try {
                // 3. パラメータ名に基づいたファイルを読み込む
                // 例: genreが "descriptive" なら "descriptive.json" を読み込む
                const response = await fetch(`${genre}.json`);
                
                if (!response.ok) throw new Error("File not found");

                allQuestions = await response.json();
                renderQuestion(allQuestions[currentIndex]);
            } catch (error) {
                console.error("データの読み込みに失敗しました:", error);
                alert("問題データの読み込みに失敗しました。ファイルが存在するか確認してください。");
                window.location.href = 'index.html';
            }
        };

        // --- 以下の renderQuestion 以降は変更なし ---

        async function renderQuestion(q) {
            currentQuestion = q;
            
            // 1. 進捗バーの更新
            const progress = ((currentIndex + 1) / allQuestions.length) * 100;
            document.getElementById("progressBar").style.width = `${progress}%`;

            // 2. 重要度の描画（星アイコン ★）
            const priorityContainer = document.getElementById("priorityContainer");
            priorityContainer.innerHTML = '重要度:'+'★'.repeat(q.priority || 0);

            // 3. 難易度の描画（バッジ形式）
            const difficultyContainer = document.getElementById("difficultyContainer");
            let diffLabel = "";
            let diffColor = "";
            if (q.difficulty === 1) { diffLabel = "基礎"; diffColor = "bg-emerald-100 text-emerald-700"; }
            else if (q.difficulty === 2) { diffLabel = "標準"; diffColor = "bg-blue-100 text-blue-700"; }
            else { diffLabel = "応用"; diffColor = "bg-rose-100 text-rose-700"; }
            
            difficultyContainer.innerHTML = `
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">難易度</span>
                <span class="${diffColor} px-2 py-0.5 rounded text-xs font-bold">${diffLabel}</span>
            `;

            // 4. 問題テキストとIDの更新        
            document.getElementById("questionId").innerText = `Q${q.id}`;
            document.getElementById("categoryName").innerText = q.category;
            
            // innerTextではなくinnerHTMLを使う（数式の特殊文字化け防止のため。ただし入力値には注意）
            document.getElementById("questionText").innerHTML = q.question;

            document.getElementById("explanationContainer").classList.add("hidden");
            document.getElementById("nextBtn").classList.add("hidden");

            const container = document.getElementById("AnsweArea");
            container.innerHTML = ""; 

            if (q.type === "選択式") {
                // --- 選択肢生成ロジック ---
                q.choices.forEach(choice => {
                    const btn = document.createElement("button");
                    btn.className = "w-full p-4 text-left border-2 border-slate-200 rounded-xl hover:bg-blue-50 hover:border-blue-500 transition-all duration-200";
                    btn.innerHTML = choice; 
                    btn.onclick = () => checkAnswer(choice, btn);
                    container.appendChild(btn);
                });
            } else if (q.type === "回答式") {
                // --- 自由入力フォーム生成ロジック ---
                const wrapper = document.createElement("div");
                wrapper.className = "flex flex-col gap-3";
                
                const input = document.createElement("input");
                input.type = "text";
                input.id = "answerInput";
                input.placeholder = "回答を入力してください（例：分散）";
                input.className = "w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 outline-none transition-all";
                
                const submitBtn = document.createElement("button");
                submitBtn.innerText = "解答を確定する";
                submitBtn.className = "w-full p-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all";
                
                submitBtn.onclick = () => checkAnswer(input.value.trim(), input);
                
                // エンターキーでも確定できるように
                input.onkeypress = (e) => { if (e.key === 'Enter') submitBtn.click(); };

                wrapper.appendChild(input);
                wrapper.appendChild(submitBtn);
                container.appendChild(wrapper);
            }

            if (window.MathJax) {
                await MathJax.typesetPromise();
            }
        }

        async function checkAnswer(submittedValue, element) {
            // すでに正誤判定済みなら何もしない
            if (document.getElementById("nextBtn").classList.contains("hidden") === false) return;

            const isCorrect = (submittedValue === currentQuestion.answer);
            
            // UIのフィードバック
            if (currentQuestion.type === "選択式") {
                const allBtns = document.querySelectorAll("#choicesContainer button");
                allBtns.forEach(b => b.disabled = true);
                
                if (isCorrect) {
                    element.classList.replace("border-slate-200", "border-emerald-500");
                    element.classList.add("bg-emerald-50");
                } else {
                    element.classList.replace("border-slate-200", "border-rose-500");
                    element.classList.add("bg-rose-50");
                }
            } else {
                // 回答式の場合
                element.disabled = true;
                if (isCorrect) {
                    element.classList.add("border-emerald-500", "bg-emerald-50");
                } else {
                    element.classList.add("border-rose-500", "bg-rose-50");
                    // 不正解のときは正解を表示してあげる親切設計
                    element.value = `残念！正解は: ${currentQuestion.answer}`;
                }
                // 確定ボタンを無効化
                element.nextElementSibling.disabled = true;
                element.nextElementSibling.classList.replace("bg-blue-600", "bg-slate-300");
            }

            // 解説を表示
            const expContainer = document.getElementById("explanationContainer");
            const expText = document.getElementById("explanation");
            expText.innerHTML = currentQuestion.explanation || "解説は準備中です。";
            expContainer.classList.remove("hidden"); 
            document.getElementById("nextBtn").classList.remove("hidden");

            if (window.MathJax) {
                await MathJax.typesetPromise([expContainer]);
            }
        }

        async function askAI() {
            const API_KEY = "MY_NEW_API_KEY"; // ここに新しいキーを入れる
            const input = document.getElementById("userQuestion");
            const question = input.value.trim();
            const historyDiv = document.getElementById("ai-chat-history");
            const loadingDiv = document.getElementById("loading");

            if (!question) return;

            // ユーザー質問を表示
            historyDiv.innerHTML += `<div class="text-right ml-8"><div class="inline-block bg-blue-600 text-white p-2 rounded-lg mb-2">${question}</div></div>`;
            input.value = "";
            loadingDiv.classList.remove("hidden");
            historyDiv.scrollTop = historyDiv.scrollHeight;

            const prompt = `あなたは統計学の専門家です。生徒が以下の問題を解くのを手助けしてください。
            【問題】: ${currentQuestion.question}
            【公式】: ${currentQuestion.formula}
            【選択肢】: ${currentQuestion.choices.join(", ")}
            質問: "${question}"
            回答ルール:
            - 直接的な正解は言わず、数学的なヒントを提示してください。
            - 数式は LaTeX ( \\( ... \\) ) で書いてください。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const result = await response.json();
                let aiText = result.candidates[0].content.parts[0].text;
                aiText = aiText.replace(/\$(.*?)\$/g, '\\($1\\)'); // $ を \( に変換

                historyDiv.innerHTML += `<div class="bg-slate-100 p-2 rounded-lg text-slate-800 mb-2 border border-slate-200"><b>AI:</b> ${aiText}</div>`;
                if (window.MathJax) { await MathJax.typesetPromise([historyDiv]); }
                historyDiv.scrollTop = historyDiv.scrollHeight;
            } catch (e) {
                alert("APIエラーが発生しました。キーを確認してください。");
            } finally {
                loadingDiv.classList.add("hidden");
            }
        }
        function nextQuestion() {
        currentIndex++;
            
            if (currentIndex < allQuestions.length) {
                    renderQuestion(allQuestions[currentIndex]);
                } else {
                    // --- 解説ページへ飛ばす処理 ---
                    // 全問題のデータを保存（必要ならユーザーの正誤履歴も足せます）
                    localStorage.setItem('quizData', JSON.stringify(allQuestions));
                    
                    // ページ遷移
                    window.location.href = 'explanation.html';
                }
            }
    </script>
</body>
</html>
